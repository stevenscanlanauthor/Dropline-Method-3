# Dropline Method 3 — static web app at droplinemethod.com
# Connect this repo in Render → New → Blueprint

services:
  - type: web
    name: dropline-method-3-web
    runtime: static
    buildCommand: npm ci && npm run build:web
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_APP_URL
        value: https://www.droplinemethod.com
      # Set when the Mac App Store listing is live (e.g. https://apps.apple.com/app/dropline/idXXXXXXXXX)
      - key: VITE_MAC_APP_STORE_URL
        sync: false
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /.well-known/apple-app-site-association
        name: Content-Type
        value: application/json
      - path: /apple-app-site-association
        name: Content-Type
        value: application/json
      - path: /manifest.webmanifest
        name: Content-Type
        value: application/manifest+json

# Add custom domains in Render Dashboard → Settings → droplinemethod.com, www.droplinemethod.com
# Google Search: submit sitemap at Search Console → https://www.droplinemethod.com/sitemap.xml
# Safari “Open in App” also needs Associated Domains on com.dropline.app (see Manuscript-Master/artifacts/dropline-desktop).

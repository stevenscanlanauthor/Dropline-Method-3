# Dropline — Render Blueprint (web + API + Postgres)
# Standalone app — no connection to AuthorsDrop.

services:
  - type: web
    name: dropline
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run build:web && npm run build --workspace @dropline/api-server
    preDeployCommand: NPM_CONFIG_PRODUCTION=false npm run push --workspace @dropline/db
    # Run from repo root. Bundle is mostly self-contained; apple library still needs node_modules.
    startCommand: WEB_DIST_PATH=$PWD/apps/web/dist NODE_ENV=production node apps/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dropline-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        value: https://www.droplinemethod.com
      - key: CORS_ORIGIN
        value: https://droplinemethod.com,https://www.droplinemethod.com
      - key: BILLING_TRIAL_DAYS
        value: "14"
      - key: BILLING_MAC_PRICE_DISPLAY
        value: "39"
      - key: BILLING_IOS_PRICE_DISPLAY
        value: "29"
      - key: OPEN_REGISTRATION
        value: "true"
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "true"
      - key: RESEND_FROM_EMAIL
        value: noreply@droplinemethod.com
      - key: RESEND_API_KEY
        sync: false
      - key: APPLE_REVIEW_PASSWORD
        sync: false
      - key: APPLE_REVIEW_EXPIRED_PASSWORD
        sync: false
      - key: ADMIN_BOOTSTRAP_KEY
        sync: false
      - key: APPLE_IOS_BUNDLE_ID
        value: com.droplinemethod.app
      - key: APPLE_MAC_BUNDLE_ID
        value: com.dropline.app
      - key: APPLE_IOS_PRODUCT_ID
        value: com.droplinemethod.app.lifetime
      - key: APPLE_MAC_PRODUCT_ID
        value: com.dropline.app.lifetime
      - key: APPLE_APP_APPLE_ID
        value: "6766370853"
      - key: APPLE_APP_STORE_ENV
        value: production
      - key: ADMIN_INITIAL_EMAIL
        sync: false
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: APPLE_APP_STORE_ISSUER_ID
        sync: false
      - key: APPLE_APP_STORE_KEY_ID
        sync: false
      - key: APPLE_APP_STORE_PRIVATE_KEY
        sync: false

databases:
  - name: dropline-db
    plan: basic-256mb
    databaseName: dropline
    user: dropline

# Custom domains: Settings → Custom Domains → droplinemethod.com + www

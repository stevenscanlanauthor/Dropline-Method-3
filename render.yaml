# Dropline — Render Blueprint (web + API + Postgres)
# Standalone app — no connection to AuthorsDrop.

services:
  - type: web
    name: dropline
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build:web && npm run build --workspace @dropline/api-server
    preDeployCommand: npm run push --workspace @dropline/db
    startCommand: cd apps/api-server/dist && WEB_DIST_PATH=../../web/dist NODE_ENV=production node index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dropline-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        value: https://www.droplinemethod.com
      - key: CORS_ORIGIN
        value: https://droplinemethod.com,https://www.droplinemethod.com
      - key: ADMIN_INITIAL_EMAIL
        sync: false
      - key: ADMIN_INITIAL_PASSWORD
        sync: false

databases:
  - name: dropline-db
    plan: basic
    databaseName: dropline
    user: dropline

# Custom domains: Settings → Custom Domains → droplinemethod.com + www
